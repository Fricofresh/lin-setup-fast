# Configuration file for update-alternatives (YAML format)
# Each alternative requires: command, path, and priority

alternatives:
  - command: editor
    path: /usr/bin/vim.basic
    priority: 50
  - command: explorer
    path: /usr/bin/dolphin
    priority: 10

